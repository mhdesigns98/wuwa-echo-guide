<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WuWa Echo Set Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #04060e; min-height: 100vh; }
    body { font-family: 'Mulish', sans-serif; color: #e2e8f0; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #04060e; }
    ::-webkit-scrollbar-thumb { background: #1e2d4a; border-radius: 3px; }
    button { cursor: pointer; border: none; outline: none; background: none; font-family: inherit; }
    input { font-family: inherit; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-anim { animation: fadeIn 0.2s ease forwards; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid #0e1828;
      border-top-color: #2d4a6a;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
  const { useState, useMemo, useEffect } = React;

  /* ───── Element theme map ───── */
  const T = {
    Electro:   { color: "#b57bee", glow: "#7c3aed", dim: "rgba(124,58,237,0.10)", badge: "#1e0a38" },
    Aero:      { color: "#4ade80", glow: "#16a34a", dim: "rgba(22,163,74,0.10)",   badge: "#041a0c" },
    Spectro:   { color: "#fbbf24", glow: "#d97706", dim: "rgba(217,119,6,0.10)",   badge: "#2a1500" },
    Fusion:    { color: "#fb923c", glow: "#ea580c", dim: "rgba(234,88,12,0.10)",   badge: "#2a0e00" },
    Glacio:    { color: "#67e8f9", glow: "#0891b2", dim: "rgba(8,145,178,0.10)",   badge: "#031520" },
    Havoc:     { color: "#f87171", glow: "#dc2626", dim: "rgba(220,38,38,0.10)",   badge: "#200404" },
    Support:   { color: "#86efac", glow: "#16a34a", dim: "rgba(22,163,74,0.10)",   badge: "#041a0c" },
    Universal: { color: "#94a3b8", glow: "#475569", dim: "rgba(71,85,105,0.10)",   badge: "#0f1520" },
  };

  /* ───── CharacterCard ───── */
  function CharacterCard({ char, setTheme }) {
    const [hov, setHov] = useState(false);
    const ct = T[char.element] || T.Support;
    return (
      <div
        onMouseEnter={() => setHov(true)}
        onMouseLeave={() => setHov(false)}
        className="card-anim"
        style={{
          background: "#080c18",
          borderRadius: 10,
          border: `1px solid ${hov ? ct.color + "55" : "#131d30"}`,
          overflow: "hidden",
          transition: "border-color 0.2s, box-shadow 0.2s",
          boxShadow: hov ? `0 4px 28px ${ct.glow}1a` : "none",
        }}
      >
        <div style={{ height: 2, background: `linear-gradient(90deg, ${ct.color}cc, transparent)` }} />

        <div style={{
          padding: "12px 16px 10px",
          borderBottom: "1px solid #131d30",
          display: "flex",
          justifyContent: "space-between",
          alignItems: "flex-start",
          background: `linear-gradient(90deg, ${ct.dim}, transparent 70%)`,
        }}>
          <div>
            <div style={{ fontFamily: "Rajdhani", fontSize: 19, fontWeight: 700, color: "#f1f5f9", letterSpacing: "0.04em" }}>
              {char.name}
            </div>
            <div style={{ fontSize: 11, color: "#4a5568", marginTop: 1, letterSpacing: "0.03em" }}>{char.role}</div>
          </div>
          <span style={{
            background: ct.badge,
            border: `1px solid ${ct.color}44`,
            color: ct.color,
            padding: "3px 10px",
            borderRadius: 5,
            fontSize: 10,
            fontWeight: 700,
            fontFamily: "Rajdhani",
            letterSpacing: "0.1em",
            whiteSpace: "nowrap",
            marginTop: 2,
          }}>
            {char.element.toUpperCase()}
          </span>
        </div>

        <div style={{ padding: "12px 16px 10px" }}>
          <div style={{
            fontSize: 9, color: "#3a4a60", fontWeight: 700,
            letterSpacing: "0.14em", textTransform: "uppercase", marginBottom: 8,
          }}>
            Echo Main Stats
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6 }}>
            {[4, 3, 1].map(cost => (
              <div key={cost} style={{
                background: "#04060e", borderRadius: 7,
                padding: "8px 10px", border: "1px solid #0e1828",
              }}>
                <div style={{
                  fontSize: 9, color: setTheme.color, fontWeight: 700,
                  fontFamily: "Rajdhani", letterSpacing: "0.1em", marginBottom: 5,
                  display: "flex", alignItems: "center", gap: 4,
                }}>
                  <span style={{
                    display: "inline-block", width: 5, height: 5,
                    background: setTheme.color, borderRadius: 1,
                    transform: "rotate(45deg)", flexShrink: 0,
                  }} />
                  {cost}-COST
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                  {(char.costs[cost] || char.costs[String(cost)] || []).map((stat, i) => (
                    <div key={stat} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                      {i > 0 && (
                        <span style={{ fontSize: 8, color: "#2a3a50", fontStyle: "italic", letterSpacing: "0.05em" }}>or</span>
                      )}
                      <span style={{
                        fontSize: 11,
                        color: i === 0 ? "#c8d6e8" : "#4a5a70",
                        fontWeight: i === 0 ? 600 : 400,
                        lineHeight: 1.3,
                      }}>{stat}</span>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>

        <div style={{ padding: "0 16px 14px" }}>
          <div style={{
            fontSize: 9, color: "#3a4a60", fontWeight: 700,
            letterSpacing: "0.14em", textTransform: "uppercase", marginBottom: 7,
          }}>
            Priority Substats
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
            {char.substats.map((stat, i) => (
              <span key={stat} style={{
                background: i === 0 ? ct.dim : "#04060e",
                border: `1px solid ${i === 0 ? ct.color + "66" : "#0e1828"}`,
                borderRadius: 4, padding: "3px 9px", fontSize: 11,
                color: i === 0 ? ct.color : "#4a5a70",
                fontWeight: i === 0 ? 700 : 400,
                display: "flex", alignItems: "center", gap: 4,
              }}>
                {i === 0 && <span style={{ fontSize: 8 }}>★</span>}
                {stat}
              </span>
            ))}
          </div>
        </div>
      </div>
    );
  }

  /* ───── App ───── */
  function App() {
    const [sets, setSets]           = useState([]);
    const [loading, setLoading]     = useState(true);
    const [error, setError]         = useState(null);
    const [selectedId, setSelectedId] = useState(null);
    const [search, setSearch]       = useState("");

    useEffect(() => {
      fetch("./data.json")
        .then(r => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return r.json();
        })
        .then(data => {
          setSets(data);
          setSelectedId(data[0]?.id ?? null);
          setLoading(false);
        })
        .catch(err => {
          setError(err.message);
          setLoading(false);
        });
    }, []);

    const set = sets.find(s => s.id === selectedId);
    const theme = set ? (T[set.element] || T.Support) : T.Support;

    const filteredChars = useMemo(() => {
      if (!set) return [];
      if (!search.trim()) return set.characters;
      const q = search.toLowerCase();
      return set.characters.filter(c =>
        c.name.toLowerCase().includes(q) ||
        c.role.toLowerCase().includes(q) ||
        c.element.toLowerCase().includes(q)
      );
    }, [set, search]);

    /* Loading state */
    if (loading) return (
      <div style={{
        position: "relative", zIndex: 1,
        display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center",
        minHeight: "100vh", gap: 16,
      }}>
        <div className="spinner" />
        <div style={{ fontFamily: "Rajdhani", color: "#2d4a6a", letterSpacing: "0.12em", fontSize: 13 }}>
          LOADING DATA
        </div>
      </div>
    );

    /* Error state */
    if (error) return (
      <div style={{
        position: "relative", zIndex: 1,
        display: "flex", flexDirection: "column",
        alignItems: "center", justifyContent: "center",
        minHeight: "100vh", gap: 12, padding: 24,
      }}>
        <div style={{ fontFamily: "Rajdhani", color: "#f87171", fontSize: 20, letterSpacing: "0.1em" }}>
          FAILED TO LOAD DATA
        </div>
        <div style={{ color: "#3a4d65", fontSize: 12 }}>{error}</div>
        <div style={{ color: "#2d3f55", fontSize: 11, textAlign: "center", maxWidth: 400 }}>
          Make sure <code style={{ color: "#4a6070" }}>data.json</code> is in the same folder as <code style={{ color: "#4a6070" }}>index.html</code> and you're viewing via a server (not file://).
        </div>
      </div>
    );

    return (
      <div style={{
        position: "relative", zIndex: 1,
        maxWidth: 1100, margin: "0 auto",
        padding: "28px 20px 60px",
      }}>

        {/* Header */}
        <header style={{ marginBottom: 30 }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 14, flexWrap: "wrap" }}>
            <h1 style={{
              fontFamily: "Rajdhani", fontSize: 32, fontWeight: 700,
              color: "#f8fafc", letterSpacing: "0.1em", lineHeight: 1,
            }}>
              ECHO SET GUIDE
            </h1>
            <span style={{
              fontFamily: "Rajdhani", fontSize: 13, color: "#273548",
              letterSpacing: "0.12em", fontWeight: 600,
            }}>
              WUTHERING WAVES
            </span>
          </div>
          <p style={{ color: "#2d3f55", fontSize: 12, marginTop: 6, letterSpacing: "0.03em" }}>
            Select a set · see who uses it · know what to keep
          </p>
        </header>

        {/* Set selector tabs */}
        <div style={{ display: "flex", flexWrap: "wrap", gap: 7, marginBottom: 24 }}>
          {sets.map(s => {
            const t = T[s.element] || T.Support;
            const active = s.id === selectedId;
            return (
              <button
                key={s.id}
                onClick={() => { setSelectedId(s.id); setSearch(""); }}
                style={{
                  padding: "7px 16px", borderRadius: 6,
                  border: `1px solid ${active ? t.color + "88" : "#111e30"}`,
                  background: active ? t.dim : "#080c18",
                  color: active ? t.color : "#3a4d65",
                  fontFamily: "Rajdhani", fontWeight: 700, fontSize: 13,
                  letterSpacing: "0.05em", transition: "all 0.15s", whiteSpace: "nowrap",
                }}
                onMouseEnter={e => { if (!active) { e.currentTarget.style.color = "#8aa0be"; e.currentTarget.style.borderColor = "#1e2f45"; }}}
                onMouseLeave={e => { if (!active) { e.currentTarget.style.color = "#3a4d65"; e.currentTarget.style.borderColor = "#111e30"; }}}
              >
                {s.name}
              </button>
            );
          })}
        </div>

        {/* Set info banner */}
        {set && (
          <div style={{
            padding: "14px 18px", borderRadius: 9,
            background: theme.dim, border: `1px solid ${theme.color}33`,
            marginBottom: 20,
            display: "flex", justifyContent: "space-between",
            alignItems: "center", flexWrap: "wrap", gap: 12,
          }}>
            <div>
              <div style={{
                fontFamily: "Rajdhani", fontSize: 21, fontWeight: 700,
                color: theme.color, letterSpacing: "0.06em", lineHeight: 1.1,
              }}>
                {set.name}
              </div>
              <div style={{ color: "#4a6070", fontSize: 12, marginTop: 4, letterSpacing: "0.02em" }}>
                {set.setBonus}
              </div>
              {set.mainEcho && (
                <div style={{ marginTop: 5, fontSize: 11, letterSpacing: "0.03em" }}>
                  <span style={{ color: "#1e3040" }}>Main Echo: </span>
                  <span style={{ color: theme.color + "bb" }}>{set.mainEcho}</span>
                </div>
              )}
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
              <input
                type="text"
                placeholder="Filter characters…"
                value={search}
                onChange={e => setSearch(e.target.value)}
                style={{
                  background: "#04060e", border: "1px solid #131d30", borderRadius: 6,
                  padding: "6px 12px", color: "#94a3b8", fontSize: 12, outline: "none", width: 160,
                }}
              />
              <div style={{
                background: "#04060e", border: `1px solid ${theme.color}33`,
                borderRadius: 6, padding: "5px 14px",
                fontFamily: "Rajdhani", fontSize: 12, fontWeight: 700,
                color: theme.color, letterSpacing: "0.08em", whiteSpace: "nowrap",
              }}>
                {set.element.toUpperCase()} · {set.characters.length} CHARS
              </div>
            </div>
          </div>
        )}

        {/* Characters grid */}
        {set && set.characters.length === 0 ? (
          <div style={{ color: "#3a4d65", fontSize: 14, padding: "40px 0", textAlign: "center", letterSpacing: "0.05em" }}>
            No characters assigned to this set yet
          </div>
        ) : filteredChars.length === 0 ? (
          <div style={{ color: "#3a4d65", fontSize: 14, padding: "40px 0", textAlign: "center", letterSpacing: "0.05em" }}>
            No characters match "{search}"
          </div>
        ) : (
          <div style={{
            display: "grid",
            gridTemplateColumns: "repeat(auto-fill, minmax(310px, 1fr))",
            gap: 14,
          }}>
            {filteredChars.map(char => (
              <CharacterCard key={char.name} char={char} setTheme={theme} />
            ))}
          </div>
        )}

        <div style={{ marginTop: 48, borderTop: "1px solid #0c1624", paddingTop: 16 }}>
          <p style={{ fontSize: 11, color: "#1e2d3e", textAlign: "center", letterSpacing: "0.04em" }}>
            Data sourced from Prydwen.gg · Edit <code>data.json</code> to update · No rebuild required
          </p>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
