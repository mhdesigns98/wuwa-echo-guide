<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WuWa Echo Set Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #04060e; min-height: 100vh; }
    body { font-family: 'Mulish', sans-serif; color: #e2e8f0; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #04060e; }
    ::-webkit-scrollbar-thumb { background: #2a3d57; border-radius: 3px; }
    button { cursor: pointer; border: none; outline: none; background: none; font-family: inherit; }
    input  { font-family: inherit; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
    .card-anim { animation: fadeIn 0.18s ease forwards; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width:28px; height:28px; border:2px solid #0e1828; border-top-color:#3a6090; border-radius:50%; animation:spin 0.7s linear infinite; }
    body::before { content:''; position:fixed; inset:0; background-image: linear-gradient(rgba(255,255,255,0.012) 1px,transparent 1px), linear-gradient(90deg,rgba(255,255,255,0.012) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
    .app-shell { position:relative; z-index:1; display:flex; min-height:100vh; }
    .sidebar { width:240px; flex-shrink:0; background:#060a14; border-right:1px solid #0e1828; display:flex; flex-direction:column; position:sticky; top:0; height:100vh; overflow:hidden; }
    .sidebar-header { padding:20px 16px 14px; border-bottom:1px solid #0e1828; flex-shrink:0; }
    .sidebar-search { width:100%; background:#080c18; border:1px solid #1a2840; border-radius:6px; padding:7px 11px; color:#c0cfe0; font-size:12px; outline:none; margin-top:10px; transition:border-color 0.15s; }
    .sidebar-search:focus { border-color:#2a4a6a; }
    .sidebar-search::placeholder { color:#3a5060; }
    .element-filters { display:flex; flex-wrap:wrap; gap:5px; padding:10px 16px; border-bottom:1px solid #0e1828; flex-shrink:0; }
    .elem-btn { padding:3px 9px; border-radius:4px; font-family:'Rajdhani',sans-serif; font-size:10px; font-weight:700; letter-spacing:0.08em; border:1px solid transparent; transition:all 0.15s; }
    .set-list { overflow-y:auto; flex:1; padding:8px 0 20px; }
    .set-btn { width:100%; text-align:left; padding:8px 16px; font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:600; letter-spacing:0.03em; color:#6a8090; transition:all 0.15s; border-left:2px solid transparent; display:flex; align-items:center; gap:8px; }
    .set-btn:hover { color:#a0b8cc; background:#080c18; }
    .set-btn.active { color:#e8f0f8; background:#080e1c; }
    .set-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
    .main { flex:1; padding:28px 28px 60px; min-width:0; overflow-y:auto; }
    .mobile-menu-btn { display:none; position:fixed; bottom:20px; right:20px; z-index:100; background:#0e1828; border:1px solid #1e3048; border-radius:50%; width:46px; height:46px; align-items:center; justify-content:center; font-size:18px; color:#8aaac0; }
    @media (max-width:700px) {
      .sidebar { position:fixed; top:0; left:0; z-index:50; transform:translateX(-100%); transition:transform 0.25s ease; height:100vh; }
      .sidebar.open { transform:translateX(0); }
      .main { padding:20px 16px 80px; }
      .mobile-menu-btn { display:flex; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

const T = {
  Electro:   { color:"#c084fc", glow:"#7c3aed", dim:"rgba(124,58,237,0.12)",  badge:"#1e0a38" },
  Aero:      { color:"#4ade80", glow:"#16a34a", dim:"rgba(22,163,74,0.12)",   badge:"#041a0c" },
  Spectro:   { color:"#fcd34d", glow:"#d97706", dim:"rgba(217,119,6,0.12)",   badge:"#2a1500" },
  Fusion:    { color:"#fb923c", glow:"#ea580c", dim:"rgba(234,88,12,0.12)",   badge:"#2a0e00" },
  Glacio:    { color:"#67e8f9", glow:"#0891b2", dim:"rgba(8,145,178,0.12)",   badge:"#031520" },
  Havoc:     { color:"#f87171", glow:"#dc2626", dim:"rgba(220,38,38,0.12)",   badge:"#200404" },
  Support:   { color:"#6ee7b7", glow:"#059669", dim:"rgba(5,150,105,0.12)",   badge:"#041a0e" },
  Universal: { color:"#b0bfd0", glow:"#475569", dim:"rgba(71,85,105,0.12)",   badge:"#0f1520" },
};

const ELEMENTS = ["All","Electro","Aero","Spectro","Fusion","Glacio","Havoc","Support","Universal"];

function CharacterCard({ char, setTheme }) {
  const [hov, setHov] = useState(false);
  const ct = T[char.element] || T.Universal;
  return (
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} className="card-anim"
      style={{ background:"#080c18", borderRadius:10, border:`1px solid ${hov ? ct.color+"60" : "#182030"}`, overflow:"hidden", transition:"border-color 0.2s, box-shadow 0.2s", boxShadow: hov ? `0 4px 24px ${ct.glow}22` : "none" }}>
      <div style={{ height:2, background:`linear-gradient(90deg, ${ct.color}cc, transparent)` }} />
      <div style={{ padding:"12px 16px 10px", borderBottom:"1px solid #182030", display:"flex", justifyContent:"space-between", alignItems:"flex-start", background:`linear-gradient(90deg, ${ct.dim}, transparent 70%)` }}>
        <div>
          <div style={{ fontFamily:"Rajdhani", fontSize:19, fontWeight:700, color:"#f0f4f8", letterSpacing:"0.04em" }}>{char.name}</div>
          <div style={{ fontSize:11, color:"#7a90a8", marginTop:2, letterSpacing:"0.03em" }}>{char.role}</div>
        </div>
        <span style={{ background:ct.badge, border:`1px solid ${ct.color}55`, color:ct.color, padding:"3px 10px", borderRadius:5, fontSize:10, fontWeight:700, fontFamily:"Rajdhani", letterSpacing:"0.1em", whiteSpace:"nowrap", marginTop:2 }}>
          {char.element.toUpperCase()}
        </span>
      </div>
      <div style={{ padding:"12px 16px 10px" }}>
        <div style={{ fontSize:9, color:"#6a8098", fontWeight:700, letterSpacing:"0.14em", textTransform:"uppercase", marginBottom:8 }}>Echo Main Stats</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:6 }}>
          {[4,3,1].map(cost => (
            <div key={cost} style={{ background:"#04060e", borderRadius:7, padding:"8px 10px", border:"1px solid #101c28" }}>
              <div style={{ fontSize:9, color:setTheme.color, fontWeight:700, fontFamily:"Rajdhani", letterSpacing:"0.1em", marginBottom:5, display:"flex", alignItems:"center", gap:4 }}>
                <span style={{ display:"inline-block", width:5, height:5, background:setTheme.color, borderRadius:1, transform:"rotate(45deg)", flexShrink:0 }} />
                {cost}-COST
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:3 }}>
                {(char.costs[cost] || char.costs[String(cost)] || []).map((stat,i) => (
                  <div key={stat+i} style={{ display:"flex", alignItems:"center", gap:4 }}>
                    {i > 0 && <span style={{ fontSize:8, color:"#4a6070", fontStyle:"italic" }}>or</span>}
                    <span style={{ fontSize:11, color: i===0 ? "#d0dde8" : "#6a8098", fontWeight: i===0 ? 600 : 400, lineHeight:1.3 }}>{stat}</span>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>
      <div style={{ padding:"0 16px 14px" }}>
        <div style={{ fontSize:9, color:"#6a8098", fontWeight:700, letterSpacing:"0.14em", textTransform:"uppercase", marginBottom:7 }}>Priority Substats</div>
        <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
          {char.substats.map((stat,i) => (
            <span key={stat+i} style={{ background: i===0 ? ct.dim : "#04060e", border:`1px solid ${i===0 ? ct.color+"70" : "#101c28"}`, borderRadius:4, padding:"3px 9px", fontSize:11, color: i===0 ? ct.color : "#7a90a8", fontWeight: i===0 ? 700 : 400, display:"flex", alignItems:"center", gap:4 }}>
              {i===0 && <span style={{ fontSize:8 }}>★</span>}
              {stat}
            </span>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [sets, setSets]             = useState([]);
  const [loading, setLoading]       = useState(true);
  const [error, setError]           = useState(null);
  const [selectedId, setSelectedId] = useState(null);
  const [charSearch, setCharSearch] = useState("");
  const [setSearch, setSetSearch]   = useState("");
  const [elemFilter, setElemFilter] = useState("All");
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const activeRef = useRef(null);

  useEffect(() => {
    fetch("./data.json")
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(data => { setSets(data); setSelectedId(data[0]?.id ?? null); setLoading(false); })
      .catch(err => { setError(err.message); setLoading(false); });
  }, []);

  useEffect(() => {
    if (activeRef.current) activeRef.current.scrollIntoView({ block:"nearest", behavior:"smooth" });
  }, [selectedId]);

  const set   = sets.find(s => s.id === selectedId);
  const theme = set ? (T[set.element] || T.Universal) : T.Universal;

  const filteredSets = useMemo(() => sets.filter(s => {
    const matchElem   = elemFilter === "All" || s.element === elemFilter;
    const matchSearch = s.name.toLowerCase().includes(setSearch.toLowerCase());
    return matchElem && matchSearch;
  }), [sets, elemFilter, setSearch]);

  const filteredChars = useMemo(() => {
    if (!set) return [];
    if (!charSearch.trim()) return set.characters;
    const q = charSearch.toLowerCase();
    return set.characters.filter(c =>
      c.name.toLowerCase().includes(q) ||
      c.role.toLowerCase().includes(q) ||
      c.element.toLowerCase().includes(q)
    );
  }, [set, charSearch]);

  const selectSet = id => { setSelectedId(id); setCharSearch(""); setSidebarOpen(false); };

  if (loading) return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", minHeight:"100vh", gap:16, position:"relative", zIndex:1 }}>
      <div className="spinner" />
      <div style={{ fontFamily:"Rajdhani", color:"#4a7090", letterSpacing:"0.12em", fontSize:13 }}>LOADING DATA</div>
    </div>
  );

  if (error) return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", minHeight:"100vh", gap:12, padding:24, position:"relative", zIndex:1 }}>
      <div style={{ fontFamily:"Rajdhani", color:"#f87171", fontSize:20, letterSpacing:"0.1em" }}>FAILED TO LOAD DATA</div>
      <div style={{ color:"#7a90a8", fontSize:12 }}>{error}</div>
      <div style={{ color:"#5a7080", fontSize:11, textAlign:"center", maxWidth:400 }}>
        Make sure <code style={{color:"#7a9ab8"}}>data.json</code> is in the same folder as <code style={{color:"#7a9ab8"}}>index.html</code> and you're viewing via a server (not file://).
      </div>
    </div>
  );

  return (
    <div className="app-shell">
      <aside className={`sidebar${sidebarOpen ? " open" : ""}`}>
        <div className="sidebar-header">
          <div style={{ fontFamily:"Rajdhani", fontSize:20, fontWeight:700, color:"#e8f0f8", letterSpacing:"0.1em", lineHeight:1 }}>ECHO SET GUIDE</div>
          <div style={{ fontFamily:"Rajdhani", fontSize:10, color:"#3a5568", letterSpacing:"0.15em", marginTop:3 }}>WUTHERING WAVES</div>
          <input className="sidebar-search" type="text" placeholder="Search sets…" value={setSearch} onChange={e=>setSetSearch(e.target.value)} />
        </div>

        <div className="element-filters">
          {ELEMENTS.map(el => {
            const t = T[el] || null;
            const active = elemFilter === el;
            return (
              <button key={el} className="elem-btn" onClick={()=>setElemFilter(el)}
                style={{ background: active ? (t ? t.dim : "rgba(255,255,255,0.08)") : "transparent", border:`1px solid ${active ? (t ? t.color+"80" : "#4a6070") : "#182030"}`, color: active ? (t ? t.color : "#c0d0e0") : "#5a7080" }}>
                {el}
              </button>
            );
          })}
        </div>

        <div className="set-list">
          {filteredSets.length === 0 && (
            <div style={{ padding:"20px 16px", color:"#3a5060", fontSize:12 }}>No sets match</div>
          )}
          {filteredSets.map(s => {
            const t = T[s.element] || T.Universal;
            const active = s.id === selectedId;
            return (
              <button key={s.id} ref={active ? activeRef : null}
                className={`set-btn${active ? " active" : ""}`}
                onClick={()=>selectSet(s.id)}
                style={{ borderLeftColor: active ? t.color : "transparent", color: active ? "#e8f0f8" : "#6a8090" }}>
                <span className="set-dot" style={{ background: t.color+(active ? "ff" : "60") }} />
                {s.name}
              </button>
            );
          })}
        </div>

        <div style={{ padding:"10px 16px", borderTop:"1px solid #0e1828", fontSize:10, color:"#2a3a48", letterSpacing:"0.04em" }}>
          {sets.length} sets · Data from Prydwen.gg
        </div>
      </aside>

      <main className="main">
        {set ? (
          <>
            <div style={{ padding:"16px 20px", borderRadius:10, background:theme.dim, border:`1px solid ${theme.color}40`, marginBottom:22, display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:12 }}>
              <div>
                <div style={{ fontFamily:"Rajdhani", fontSize:24, fontWeight:700, color:theme.color, letterSpacing:"0.06em", lineHeight:1.1 }}>{set.name}</div>
                <div style={{ color:"#8aaabb", fontSize:12, marginTop:5, letterSpacing:"0.02em" }}>{set.setBonus}</div>
                {set.mainEcho && (
                  <div style={{ marginTop:5, fontSize:11, letterSpacing:"0.03em" }}>
                    <span style={{ color:"#5a7080" }}>Main Echo: </span>
                    <span style={{ color:theme.color }}>{set.mainEcho}</span>
                  </div>
                )}
              </div>
              <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
                <input type="text" placeholder="Filter characters…" value={charSearch} onChange={e=>setCharSearch(e.target.value)}
                  style={{ background:"#04060e", border:"1px solid #182030", borderRadius:6, padding:"6px 12px", color:"#c0cfe0", fontSize:12, outline:"none", width:160 }} />
                <div style={{ background:"#04060e", border:`1px solid ${theme.color}40`, borderRadius:6, padding:"5px 14px", fontFamily:"Rajdhani", fontSize:12, fontWeight:700, color:theme.color, letterSpacing:"0.08em", whiteSpace:"nowrap" }}>
                  {set.element.toUpperCase()} · {set.characters.length} CHARS
                </div>
              </div>
            </div>

            {set.characters.length === 0 ? (
              <div style={{ color:"#5a7080", fontSize:14, padding:"40px 0", textAlign:"center", letterSpacing:"0.05em" }}>No characters assigned to this set yet</div>
            ) : filteredChars.length === 0 ? (
              <div style={{ color:"#5a7080", fontSize:14, padding:"40px 0", textAlign:"center", letterSpacing:"0.05em" }}>No characters match "{charSearch}"</div>
            ) : (
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(300px, 1fr))", gap:14 }}>
                {filteredChars.map(char => <CharacterCard key={char.name} char={char} setTheme={theme} />)}
              </div>
            )}
          </>
        ) : (
          <div style={{ color:"#5a7080", fontSize:14, paddingTop:60, textAlign:"center" }}>Select a set from the sidebar</div>
        )}
      </main>

      <button className="mobile-menu-btn" onClick={()=>setSidebarOpen(o=>!o)}>
        {sidebarOpen ? "✕" : "☰"}
      </button>
      {sidebarOpen && <div onClick={()=>setSidebarOpen(false)} style={{ position:"fixed", inset:0, zIndex:40, background:"rgba(0,0,0,0.5)" }} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
